services:
  mongodb:
    image: mongo:7
    container_name: jobcopilot-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
